# ─── Render Blueprint (Infrastructure as Code) ───
# This file auto-configures the service when you connect the repo to Render.
# See: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: smart-doc-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: GEMINI_API_KEY
        sync: false            # You'll set this manually in the Render dashboard
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false            # Set to your Vercel URL in the Render dashboard
